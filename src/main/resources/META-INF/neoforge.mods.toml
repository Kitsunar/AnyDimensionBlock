modLoader = "javafml"
loaderVersion = "${loader_version_range}"
license = "${mod_license}"
accessTransformers = "META-INF/accesstransformer.cfg"

[[mods]]
    modId = "${mod_id}"
    version = "${mod_version}"
    displayName = "${mod_name}"
    description = '''${mod_description}'''
    authors = "${mod_authors}"
    logoFile = "anydimensionblock.png"

[[dependencies.anydimensionblock]]
    modId = "neoforge"
    type = "required"
    versionRange = "${neo_version_range}"
    ordering = "NONE"
    side = "BOTH"

[[dependencies.anydimensionblock]]
    modId = "minecraft"
    type = "required"
    versionRange = "${minecraft_version_range}"
    ordering = "NONE"
    side = "BOTH"
